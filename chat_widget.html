<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Виджет</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Nunito', sans-serif; }

#w-btn {
  position: fixed; bottom: 24px; right: 24px;
  width: 58px; height: 58px; border-radius: 50%;
  background: linear-gradient(to bottom, #8eda90, #2d9e5a);
  border: none; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 6px 24px rgba(30,114,63,0.45);
  transition: transform 0.2s cubic-bezier(.34,1.56,.64,1), box-shadow 0.2s;
  z-index: 9999;
}
#w-btn:hover { transform: scale(1.08); }
#w-btn:active { transform: scale(0.95); }
#w-btn .ic-close { display: none; }
#w-btn.open .ic-chat { display: none; }
#w-btn.open .ic-close { display: block; }
#w-btn::after {
  content: ''; position: absolute; top: 5px; right: 5px;
  width: 11px; height: 11px; background: #fff;
  border-radius: 50%; border: 2px solid #2d9e5a;
  animation: dot 2.4s ease-in-out infinite;
}
@keyframes dot { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.6;transform:scale(1.25)} }

#w-win {
  position: fixed; bottom: 94px; right: 24px;
  width: min(360px, calc(100vw - 24px));
  height: min(560px, calc(100vh - 110px));
  border-radius: 18px; background: #fff;
  box-shadow: 0 20px 64px rgba(0,0,0,0.14);
  display: flex; flex-direction: column; overflow: hidden;
  z-index: 9998; transform-origin: bottom right;
  transform: scale(0.8) translateY(16px); opacity: 0; pointer-events: none;
  transition: transform 0.28s cubic-bezier(.34,1.56,.64,1), opacity 0.2s;
}
#w-win.open { transform: scale(1) translateY(0); opacity: 1; pointer-events: all; }

.w-head {
  background: linear-gradient(to bottom, #8eda90, #2d9e5a);
  padding: 14px 16px; display: flex; align-items: center; gap: 11px; flex-shrink: 0;
}
.w-head-ico {
  width: 38px; height: 38px; background: rgba(255,255,255,0.22);
  border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0;
}
.w-head-title { font-size: 0.82rem; font-weight: 600; color: #fff; }
.w-head-sub { font-size: 0.7rem; color: rgba(255,255,255,0.82); font-weight: 400; margin-top: 1px; display: flex; align-items: center; gap: 5px; }
.w-head-sub::before { content: ''; width: 6px; height: 6px; background: #c8f5cb; border-radius: 50%; flex-shrink: 0; }
.w-call-btn {
  margin-left: auto; display: flex; align-items: center; gap: 5px;
  padding: 6px 12px; background: rgba(255,255,255,0.22);
  border: 1.5px solid rgba(255,255,255,0.5); border-radius: 20px;
  color: #fff; font-size: 0.8rem; font-family: 'Nunito', sans-serif;
  font-weight: 600; text-decoration: none; flex-shrink: 0;
  transition: background .15s, transform .15s;
}
.w-call-btn:hover { background: rgba(255,255,255,0.35); transform: translateY(-1px); }

/* Быстрые подсказки */
.w-hints {
  padding: 8px 12px 4px;
  display: flex; flex-wrap: wrap; gap: 6px; flex-shrink: 0;
  border-bottom: 1px solid #e8f2ea;
}
.w-hint {
  padding: 4px 10px; background: #f1f8f2; border: 1px solid #c8e8ce;
  border-radius: 14px; font-size: 0.72rem; color: #2d7a42;
  cursor: pointer; font-family: 'Nunito', sans-serif;
  transition: background .15s, transform .12s;
  white-space: nowrap;
}
.w-hint:hover { background: #ddf0e0; transform: translateY(-1px); }
.w-hint:active { transform: scale(0.95); }

.w-msgs {
  flex: 1; overflow-y: auto; padding: 14px 13px;
  display: flex; flex-direction: column; gap: 10px; scroll-behavior: smooth;
}
.w-msgs::-webkit-scrollbar { width: 3px; }
.w-msgs::-webkit-scrollbar-thumb { background: #d4e8d8; border-radius: 3px; }

.msg { display: flex; flex-direction: column; max-width: 82%; animation: msgIn .22s ease; }
@keyframes msgIn { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:none} }
.msg.bot { align-self: flex-start; }
.msg.usr { align-self: flex-end; }
.msg-b {
  padding: 9px 13px; border-radius: 14px;
  font-size: 0.84rem; line-height: 1.55; word-break: break-word;
}
.msg.bot .msg-b { background: #f1f8f2; color: #1a3320; border-bottom-left-radius: 3px; }
.msg.usr .msg-b { background: linear-gradient(to bottom, #8eda90, #2d9e5a); color: #fff; border-bottom-right-radius: 3px; }
.msg-t { font-size: 0.66rem; color: #b0c4b5; margin-top: 3px; }
.msg.usr .msg-t { text-align: right; }
.msg-src { margin-top: 4px; font-size: 0.67rem; color: #5a9e6a; background: #eaf4ec; padding: 2px 8px; border-radius: 20px; display: inline-block; }

/* Блоки внутри сообщения */
.msg-section { margin-top: 6px; padding: 6px 8px; background: rgba(255,255,255,0.6); border-radius: 8px; border-left: 2px solid #6cbd7c; }
.msg-section-title { font-size: 0.72rem; font-weight: 600; color: #2d7a42; margin-bottom: 2px; }

.typing { display: flex; gap: 4px; padding: 10px 13px; background: #f1f8f2; border-radius: 14px; border-bottom-left-radius: 3px; width: fit-content; }
.td { width: 6px; height: 6px; background: #6cbd7c; border-radius: 50%; animation: tb 1.1s infinite; }
.td:nth-child(2){animation-delay:.18s} .td:nth-child(3){animation-delay:.36s}
@keyframes tb { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-5px)} }

.w-inp-area {
  padding: 10px 12px 12px; border-top: 1px solid #e8f2ea;
  display: flex; gap: 8px; align-items: flex-end; flex-shrink: 0;
}
#w-inp {
  flex: 1; border: 1.5px solid #d0e8d4; border-radius: 11px;
  padding: 9px 12px; font-size: 0.84rem; font-family: 'Nunito', sans-serif;
  resize: none; outline: none; line-height: 1.4; max-height: 90px;
  color: #1a3320; background: #f7fbf7; transition: border-color .15s, background .15s;
}
#w-inp:focus { border-color: #2d9e5a; background: #fff; }
#w-inp::placeholder { color: #9dbea4; }
#w-send {
  width: 38px; height: 38px; border-radius: 10px;
  background: linear-gradient(to bottom, #8eda90, #2d9e5a);
  border: none; cursor: pointer;
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  box-shadow: 0 3px 10px rgba(30,114,63,0.35);
  transition: transform .15s, box-shadow .15s;
}
#w-send:hover { transform: translateY(-2px); box-shadow: 0 5px 14px rgba(30,114,63,0.4); }
#w-send:active { transform: scale(0.93); }
#w-send:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

.phone-link {
  color: #2d7a42; font-weight: 600; text-decoration: none;
  background: #e8f5ea; padding: 1px 6px; border-radius: 6px;
  border-bottom: 1.5px solid #8eda90; white-space: nowrap;
  display: inline-flex; align-items: center; gap: 3px;
}
.phone-link::before { content: '📞'; font-size: 0.75em; }
.phone-link:hover { background: #d0edda; border-color: #2d9e5a; }

/* Уведомление об ошибке */
.msg.err .msg-b { background: #fff1f1; color: #a03030; border-left: 2px solid #e07070; }
</style>
</head>
<body>

<button id="w-btn" aria-label="Открыть чат">
  <svg class="ic-chat" width="24" height="24" viewBox="0 0 24 24" fill="none">
    <path d="M20 2H4C2.9 2 2 2.9 2 4V22L6 18H20C21.1 18 22 17.1 22 16V4C22 2.9 21.1 2 20 2Z" fill="white"/>
    <path d="M7 8H17M7 12H13" stroke="#2d9e5a" stroke-width="1.8" stroke-linecap="round"/>
  </svg>
  <svg class="ic-close" width="20" height="20" viewBox="0 0 24 24" fill="none">
    <path d="M18 6L6 18M6 6L18 18" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
  </svg>
</button>

<div id="w-win" role="dialog" aria-label="Медицинский ассистент">
  <div class="w-head">
    <div class="w-head-ico">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
        <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2z" fill="rgba(255,255,255,0.3)"/>
        <path d="M9 12h6M12 9v6" stroke="white" stroke-width="1.8" stroke-linecap="round"/>
      </svg>
    </div>
    <div>
      <div class="w-head-title">Медицинский ассистент</div>
      <div class="w-head-sub">Онлайн · отвечает быстро</div>
    </div>
    <a href="tel:131" class="w-call-btn" title="Позвонить 131">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="white">
        <path d="M6.62 10.79a15.05 15.05 0 006.59 6.59l2.2-2.2a1 1 0 011.01-.24c1.12.37 2.33.57 3.58.57a1 1 0 011 1V20a1 1 0 01-1 1C9.61 21 3 14.39 3 6a1 1 0 011-1h3.5a1 1 0 011 1c0 1.25.2 2.46.57 3.58a1 1 0 01-.25 1.01l-2.2 2.2z"/>
      </svg>
      131
    </a>
  </div>

  <!-- Быстрые подсказки -->
  <div class="w-hints" id="hints">
    <button class="w-hint" data-q="Телефон справки 1 ГКБ">📞 1 ГКБ</button>
    <button class="w-hint" data-q="Адрес 9 поликлиники">📍 9 поликлиника</button>
    <button class="w-hint" data-q="Где сделать УЗИ сердца детям">🔬 УЗИ сердца детям</button>
    <button class="w-hint" data-q="Где платно принимает невролог">👨‍⚕️ Невролог платно</button>
    <button class="w-hint" data-q="Часы работы БСМП">🕐 Часы БСМП</button>
  </div>

  <div class="w-msgs" id="msgs"></div>

  <div class="w-inp-area">
    <textarea id="w-inp" rows="1" placeholder="Введите вопрос..."></textarea>
    <button id="w-send" aria-label="Отправить">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
        <path d="M22 2L11 13M22 2L15 22L11 13M22 2L2 9L11 13" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
  </div>
</div>

<script>
const API_URL = 'http://localhost:5000/ask';

const btn   = document.getElementById('w-btn');
const win   = document.getElementById('w-win');
const msgs  = document.getElementById('msgs');
const inp   = document.getElementById('w-inp');
const sBtn  = document.getElementById('w-send');
const hints = document.getElementById('hints');

let isOpen = false, busy = false;

// ── Открыть / закрыть ─────────────────────────────────────
btn.addEventListener('click', () => {
  isOpen = !isOpen;
  btn.classList.toggle('open', isOpen);
  win.classList.toggle('open', isOpen);
  if (isOpen && msgs.children.length === 0) showWelcome();
  if (isOpen) setTimeout(() => inp.focus(), 300);
});

// ── Быстрые подсказки ─────────────────────────────────────
hints.addEventListener('click', e => {
  const h = e.target.closest('.w-hint');
  if (!h || busy) return;
  inp.value = h.dataset.q;
  send();
});

// ── Авторазмер textarea ────────────────────────────────────
inp.addEventListener('input', () => {
  inp.style.height = 'auto';
  inp.style.height = Math.min(inp.scrollHeight, 90) + 'px';
});

// ── Enter → отправить, Shift+Enter → перенос ──────────────
inp.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
});

sBtn.addEventListener('click', send);

// ── Утилиты ───────────────────────────────────────────────
function now() {
  return new Date().toLocaleTimeString('ru', { hour: '2-digit', minute: '2-digit' });
}

function esc(s) {
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function linkifyPhones(html) {
  return html.replace(
    /([+]?375[\s\-]?\(?\d{2}\)?[\s\-]?\d{3}[\s\-]?\d{2}[\s\-]?\d{2}|\b\d{3}[\-\s]\d{2}[\-\s]\d{2}\b|8\s?\(\d{4}\)\s?\d{2}[\-\s]\d{2}[\-\s]\d{2})/g,
    match => {
      const digits = match.replace(/[^\d+]/g, '');
      const tel = digits.length >= 11
        ? (digits.startsWith('+') ? digits : '+' + digits)
        : '+37517' + digits.replace(/^\+/, '');
      return `<a href="tel:${tel}" class="phone-link">${match}</a>`;
    }
  );
}

function renderText(text) {
  return linkifyPhones(
    esc(text)
      .replace(/\n/g, '<br>')
      .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
  );
}

// ── Приветственное сообщение ───────────────────────────────
function showWelcome() {
  const d = document.createElement('div');
  d.className = 'msg bot';
  d.innerHTML = `
    <div class="msg-b">
      Здравствуйте! 👋 Чем могу помочь?<br><br>
      <div class="msg-section">
        <div class="msg-section-title">📞 Телефон / 📍 Адрес / 🕐 Часы</div>
        «Телефон справки 1 ГКБ» · «Адрес 9 поликлиники» · «Режим работы БСМП»
      </div>
      <div class="msg-section">
        <div class="msg-section-title">🔬 Диагностика (УЗИ, МРТ, анализы)</div>
        «Где сделать УЗИ сердца детям» · «Цены на МРТ позвоночника» · «Где сдать кровь платно»
      </div>
      <div class="msg-section">
        <div class="msg-section-title">👨‍⚕️ Специалисты</div>
        «Где платно принимает невролог» · «Как попасть к кардиологу бесплатно»
      </div>
      <div class="msg-section">
        <div class="msg-section-title">🩺 Жалобы на здоровье</div>
        Опишите симптомы — направлю к терапевту (взрослым) или педиатру (детям)
      </div>
    </div>
    <div class="msg-t">${now()}</div>`;
  msgs.appendChild(d);
  msgs.scrollTop = msgs.scrollHeight;
}

// ── Добавить сообщение бота ────────────────────────────────
function botMsg(text, src, isErr = false) {
  const d = document.createElement('div');
  d.className = 'msg bot' + (isErr ? ' err' : '');
  d.innerHTML =
    `<div class="msg-b">${renderText(text)}</div>` +
    (src ? `<div class="msg-src">📄 ${esc(src)}</div>` : '') +
    `<div class="msg-t">${now()}</div>`;
  msgs.appendChild(d);
  msgs.scrollTop = msgs.scrollHeight;
}

// ── Добавить сообщение пользователя ───────────────────────
function usrMsg(text) {
  const d = document.createElement('div');
  d.className = 'msg usr';
  d.innerHTML = `<div class="msg-b">${esc(text)}</div><div class="msg-t">${now()}</div>`;
  msgs.appendChild(d);
  msgs.scrollTop = msgs.scrollHeight;
}

// ── Индикатор печати ───────────────────────────────────────
function showTyping() {
  const d = document.createElement('div');
  d.className = 'msg bot'; d.id = 'typ';
  d.innerHTML = '<div class="typing"><div class="td"></div><div class="td"></div><div class="td"></div></div>';
  msgs.appendChild(d);
  msgs.scrollTop = msgs.scrollHeight;
}
function hideTyping() {
  const el = document.getElementById('typ');
  if (el) el.remove();
}

// ── Отправка запроса ──────────────────────────────────────
async function send() {
  const text = inp.value.trim();
  if (!text || busy) return;

  inp.value = '';
  inp.style.height = 'auto';
  busy = true;
  sBtn.disabled = true;

  usrMsg(text);
  showTyping();

  try {
    const r = await fetch(API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ query: text })
    });
    if (!r.ok) throw new Error('HTTP ' + r.status);
    const data = await r.json();
    hideTyping();
    botMsg(data.answer || data.response || 'Нет ответа', data.source || null);
  } catch (err) {
    hideTyping();
    botMsg('Не удалось получить ответ. Попробуйте позже или позвоните на 131.', null, true);
    console.error(err);
  }

  busy = false;
  sBtn.disabled = false;
  inp.focus();
}
</script>
</body>
</html>
